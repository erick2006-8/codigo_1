<html lang="es">
<head>

    <link rel="stylesheet" href="/front/css/styles.css">
    <title>Nervous</title>
</head>
<body>
    <main>
        <h1 id="primera"></h1>
        <video src="imagenes/nervous.mp4" autoplay muted loop class="video" id="video-fondo"></video>
        <button class="animacionboton" id="inicio" onclick="iniciar()">
            <span></span>
            <span></span>
            <span></span>
            <span></span>

        </button>
        <div id="caja">
            <button class="reload" id="pausa">⏸ Pausa </button>
            <button class="reload" id="reanudar">▶ Reanudar</button>
        </div>
        <h1 id="todo"></h1>
        <button class="animacionboton" id="reinicio" onclick="reiniciar()" style="display: none;">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span style="position: relative; z-index: 1;">🔄 Reiniciar</span>
        </button>
        <h1 id="ultimaparte"></h1>
        <audio id="audio" volume="0.9">
            <source src="imagenes y videos/nervous.mp3" type="audio/mpeg">
        </audio>
    </main>
        
<script src="/front/js/script.js"></script>
</body>
</html>
