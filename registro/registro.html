<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 ,maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/registro/registro.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Registrarse</title>
</head>
<body>
    <div class="inicio">
        <a href="../index.html" id="inicio" class="botones">Inicio</a>
    </div>
    <form class="formulario" id="Resgistro">
        <img src="/imagenes/login.png" alt="usuario">
        <label for="username">Usuario</label>
        <input type="text" id="username" placeholder="Nombre de usuario" required>
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Contraseña" required>
        <label for="repetir_contraseña">Repetir Contraseña</label>
        <input type="password" id="repetir_contraseña" placeholder="Contraseña anterior" required>
        <div class="box-visible">
            <input type="checkbox" id="visible">
            <label for="visible">Mostrar Contraseña</label>
        </div>
        <button type="submit" id="submit">Registrarse</button>
    </form>
</body>
<script src="/registro/registro.js"></script>
</html>
